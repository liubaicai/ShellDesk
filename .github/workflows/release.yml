name: build-packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub Release after build"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: build-packages-${{ github.workflow }}-${{ github.ref_type }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  STRICT_VERSION_REF_RE: '^refs/tags/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[A-Za-z][0-9A-Za-z-]*|[0-9A-Za-z][0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[A-Za-z][0-9A-Za-z-]*|[0-9A-Za-z][0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?$'

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            pack_script: pack:mac
          - name: windows
            os: windows-latest
            pack_script: pack:win-x64
            rust_target: ""
          - name: linux-x64
            os: ubuntu-22.04
            pack_script: pack:linux-x64
            rust_target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm libarchive-tools zstd

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing secrets
        shell: bash
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to build signed Tauri updater artifacts."
            echo "::error::Generate it with 'pnpm tauri signer generate -- -w ~/.tauri/shelldesk.key' and store the private key in repository secrets."
            exit 1
          fi
          if [[ -z "${TAURI_UPDATER_PUBLIC_KEY}" ]]; then
            echo "::error::TAURI_UPDATER_PUBLIC_KEY is required so the app can verify signed updater artifacts at runtime."
            echo "::error::Store the public key printed by 'pnpm tauri signer generate' in repository secrets."
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}

      - name: Set version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" =~ $STRICT_VERSION_REF_RE ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-sha-${GITHUB_SHA:0:7}"
          fi
          echo "Setting version to ${VERSION}"
          node scripts/set-release-version.cjs "${VERSION}"
          node scripts/set-release-version.cjs "${VERSION}" --check

      - name: Build package
        run: pnpm run ${{ matrix.pack_script }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: shelldesk-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.pkg.tar.zst
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.json
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.exe
            src-tauri/target/*/release/bundle/**/*.msi
            src-tauri/target/*/release/bundle/**/*.AppImage
            src-tauri/target/*/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/*/release/bundle/**/*.app.tar.gz
            src-tauri/target/*/release/bundle/**/*.deb
            src-tauri/target/*/release/bundle/**/*.rpm
            src-tauri/target/*/release/bundle/**/*.pkg.tar.zst
            src-tauri/target/*/release/bundle/**/*.zip
            src-tauri/target/*/release/bundle/**/*.sig
            src-tauri/target/*/release/bundle/**/*.json
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v')
      && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release))
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF" =~ $STRICT_VERSION_REF_RE ]]; then
            echo "::error::Release tags must be v<MAJOR>.<MINOR>.<PATCH> or v<MAJOR>.<MINOR>.<PATCH>-<prerelease>."
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate Release Body
        run: node .github/scripts/generate-release-note.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Generate Tauri updater manifest
        run: node .github/scripts/generate-tauri-updater-manifest.js artifacts artifacts/latest.json
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_NOTES_PATH: release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.tar.gz
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.zip
            artifacts/**/*.sig
            artifacts/**/*.json
          generate_release_notes: true
          fail_on_unmatched_files: false
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
